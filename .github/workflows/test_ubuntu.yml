name: Test Ubuntu features

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
  pull_request:
  schedule:
    - cron: '0 2 * * *'

jobs:
  Ubuntu:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, ubuntu-latest]
        features:
          [
            "ai-config",
            "ansible",
            "clean",
            "cli-network",
            "core",
            "git",
            "javascript",
            "micro",
            "mise",
            "nano",
            "python",
            "stow",
            "ubuntu-dropbox",
            "ubuntu-essential",
            "ubuntu-locale-zhtw",
            "ubuntu-ssh",
            "ubuntu-tz-taipei",
            "zsh",
          ]
    steps:
      - name: 🛒 Checkout
        uses: actions/checkout@v4

      - name: 🧪 Test "${{ matrix.features }}" (run 1/2)
        run: make ${{ matrix.features }}

      - name: 🧪 Test "${{ matrix.features }}" (run 2/2)
        run: make ${{ matrix.features }}
