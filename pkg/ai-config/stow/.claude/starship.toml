# https://starship.rs/config/
# See also pkg/starship/starship.toml
# Get editor completions based on the config schema
"$schema" = "https://starship.rs/config-schema.json"

format = """
📁 $directory \
🤖 ${env_var.CLAUDE_MODEL_DISPLAY_NAME} \
🧠 ${env_var.CLAUDE_CONTEXT} \
💰 ${env_var.CLAUDE_COST} \
\n \
(🕔 ${env_var.CLAUDE_RATE_5H}) \
(📆 ${env_var.CLAUDE_RATE_7D}) \
"""

add_newline = false

# Color palette: Dracula Pro
palette = "dracula-pro"

[palettes.dracula-pro]
directory = "#80FFEA"
directory_bg = "#22212C"

claude = "#FF9580"
claude_bg = "#22212C"

context = "#FFCA80"
context_bg = "#454158"

cost = "#8AFF80"
cost_bg = "#454158"

usage = "#9580FF"
usage_bg = "#22212C"

[directory]
style = "fg:directory"
format = "[$path]($style)"
truncation_length = 2
truncate_to_repo = true

[env_var.CLAUDE_MODEL_DISPLAY_NAME]
variable = "CLAUDE_MODEL_DISPLAY_NAME"
format = "[$env_value]($style)"
style = "fg:claude"

[env_var.CLAUDE_CONTEXT]
variable = "CLAUDE_CONTEXT"
format = "[$env_value]($style)"
style = "fg:context"

[env_var.CLAUDE_COST]
variable = "CLAUDE_COST"
format = "[$env_value]($style)"
style = "fg:cost"

[env_var.CLAUDE_RATE_5H]
variable = "CLAUDE_RATE_5H"
format = "[$env_value]($style)"
style = "fg:usage"

[env_var.CLAUDE_RATE_7D]
variable = "CLAUDE_RATE_7D"
format = "[$env_value]($style)"
style = "fg:usage"
